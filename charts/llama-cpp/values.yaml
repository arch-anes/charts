# Image definitions
image:
  repository: ghcr.io/ggml-org/llama.cpp
  tag: "server-{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

cudaImage:
  repository: ghcr.io/ggml-org/llama.cpp
  tag: "server-cuda-{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

rocmImage:
  repository: ghcr.io/ggml-org/llama.cpp
  tag: "server-rocm-{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

vulkanImage:
  repository: ghcr.io/ggml-org/llama.cpp
  tag: "server-vulkan-{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

intelImage:
  repository: ghcr.io/ggml-org/llama.cpp
  tag: "server-intel-{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

gpu:
  enabled: false
  useVulkan: false
  type: nvidia # Options: nvidia, amd, intel, intel_xe

embeddings:
  enabled: false
  gpu:
    enabled: false
    useVulkan: false
    type: nvidia # Options: nvidia, amd, intel, intel_xe

service:
  main:
    ports:
      main:
        port: 8080
  embeddings:
    enabled: "{{ .Values.embeddings.enabled }}"
    type: ClusterIP
    targetSelector: embeddings
    ports:
      http:
        enabled: true
        port: 8080
        targetPort: 8080

workload:
  main:
    podSpec:
      containers:
        main:
          imageSelector: |
            {{- if not .Values.gpu.enabled -}}
              image
            {{- else if .Values.gpu.useVulkan -}}
              vulkanImage
            {{- else if eq .Values.gpu.type "nvidia" -}}
              cudaImage
            {{- else if eq .Values.gpu.type "amd" -}}
              rocmImage
            {{- else if or (eq .Values.gpu.type "intel") (eq .Values.gpu.type "intel_xe") -}}
              intelImage
            {{- else -}}
              image
            {{- end -}}
          probes:
            readiness:
              enabled: true
              type: http
              port: 8080
              path: /health
            liveness:
              enabled: true
              type: http
              port: 8080
              path: /health
            startup:
              enabled: true
              type: http
              port: 8080
              path: /health
          env:
            LLAMA_ARG_MODELS_DIR: /models
            LLAMA_ARG_HOST: 0.0.0.0
            LLAMA_ARG_PORT: 8080
  embeddings:
    enabled: "{{ .Values.embeddings.enabled }}"
    primary: false
    type: Deployment
    podSpec:
      containers:
        embeddings:
          enabled: true
          primary: true
          imageSelector: |
            {{- if not .Values.embeddings.gpu.enabled -}}
              image
            {{- else if .Values.embeddings.gpu.useVulkan -}}
              vulkanImage
            {{- else if eq .Values.embeddings.gpu.type "nvidia" -}}
              cudaImage
            {{- else if eq .Values.embeddings.gpu.type "amd" -}}
              rocmImage
            {{- else if or (eq .Values.embeddings.gpu.type "intel") (eq .Values.embeddings.gpu.type "intel_xe") -}}
              intelImage
            {{- else -}}
              image
            {{- end -}}
          probes:
            readiness:
              enabled: true
              type: http
              port: 8080
              path: /health
            liveness:
              enabled: true
              type: http
              port: 8080
              path: /health
            startup:
              enabled: true
              type: http
              port: 8080
              path: /health
          env:
            LLAMA_ARG_MODELS_DIR: /models
            LLAMA_ARG_HOST: 0.0.0.0
            LLAMA_ARG_PORT: 8080
            LLAMA_ARG_EMBEDDINGS: "1"
persistence:
  models:
    enabled: true
    mountPath: /models
  cache:
    enabled: true
    type: emptyDir
    mountPath: /.cache
