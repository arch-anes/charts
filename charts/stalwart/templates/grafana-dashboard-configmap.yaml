{{- if .Values.metrics.main.enabled -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tc.v1.common.lib.chart.names.fullname" . }}-grafana-dashboard
  labels:
    {{- include "tc.v1.common.lib.metadata.allLabels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  dashboard.json: |
{{ .Files.Get "grafana_dashboard.json" | indent 4 }}
{{- end }}
