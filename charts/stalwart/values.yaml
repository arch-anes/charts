image:
  repository: stalwartlabs/stalwart
  tag: "v{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent

imageCli:
  repository: ghcr.io/stalwartlabs/cli
  tag: 1.0.10
  pullPolicy: IfNotPresent

global:
  labels: {}
  annotations: {}

service:
  main:
    ports:
      main:
        port: 8080
      smtp:
        enabled: true
        port: 25
        protocol: tcp
      smtps:
        enabled: true
        port: 465
        protocol: tcp
      submission:
        enabled: true
        port: 587
        protocol: tcp
      imap:
        enabled: true
        port: 143
        protocol: tcp
      imaps:
        enabled: true
        port: 993
        protocol: tcp
      pop3:
        enabled: false
        port: 110
        protocol: tcp
      pop3s:
        enabled: false
        port: 995
        protocol: tcp
      sieve:
        enabled: true
        port: 4190
        protocol: tcp
      https:
        enabled: false
        port: 443
        protocol: tcp

workload:
  main:
    type: StatefulSet
    podSpec:
      containers:
        main:
          probes:
            readiness:
              enabled: true
              type: http
              path: /healthz/ready
            liveness:
              enabled: true
              type: http
              path: /healthz/live
            startup:
              enabled: true
              type: http
              path: /healthz/live
          # See https://stalw.art/docs/configuration/environment-variables/
          env: {}
          securityContext:
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000

  # Configuration Job to apply the declarative plan
  apply-config:
    enabled: true
    type: Job
    annotations:
      "helm.sh/hook": post-install,post-upgrade
      "helm.sh/hook-weight": "5"
      "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    podSpec:
      restartPolicy: OnFailure
      initContainers:
        wait-for-stalwart:
          enabled: true
          type: init
          imageSelector: alpineImage
          command:
            - /bin/sh
            - -c
            - |
              # Wait for the service to be reachable
              STALWART_HOST="{{ include "tc.v1.common.lib.chart.names.fullname" . }}"
              until wget -qO- http://$STALWART_HOST:8080/healthz/ready > /dev/null 2>&1; do
                echo "Waiting for Stalwart API at http://$STALWART_HOST:8080..."
                sleep 5
              done

              echo "Done waiting for Stalwart API."
      containers:
        apply-config:
          enabled: true
          primary: true
          imageSelector: imageCli
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          args:
            - apply
            - --url
            - http://{{ include "tc.v1.common.lib.chart.names.fullname" . }}:8080
            - --file
            - /etc/stalwart/applied-config.json
          env:
            STALWART_USER: admin
            STALWART_PASSWORD: "somepass"
          securityContext:
            readOnlyRootFilesystem: false
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532

persistence:
  data:
    enabled: true
    mountPath: /var/lib/stalwart
    targetSelector:
      main:
        main: {}
  config:
    enabled: true
    type: configmap
    objectName: config
    mountPath: /etc/stalwart
    readOnly: true
    targetSelectAll: true
  logs:
    enabled: true
    type: emptyDir
    mountPath: /var/log/stalwart
    targetSelector:
      main:
        main: {}

configmap:
  config:
    enabled: true
    data:
      config.json: |
        {{- .Values.stalwart.baseConfig | toPrettyJson | nindent 2 }}
      applied-config.json: |
        {{- range $item := .Values.stalwart.appliedConfig }}
        {{- range $type, $config := $item }}
        {{- if $config.singleton }}
        {"@type":"update","object":"{{ $type }}","value":{{ $config.value | toJson }}}
        {{- else if $config.matchOn }}
        {"@type":"upsert","object":"{{ $type }}","value":{{ $config.value | toJson }},"matchOn":["{{ $config.matchOn }}"]}
        {{- else }}
        {"@type":"upsert","object":"{{ $type }}","value":{{ $config.value | toJson }}}
        {{- end }}
        {{- end }}
        {{- end }}

# See https://stalw.art/docs/configuration/declarative-deployments/
# This will be converted to JSON and applied via the sidecar
stalwart:
  baseConfig:
    "@type": "PostgreSql"
    host: postgres.db.svc.cluster.local
    port: 5432
    database: stalwart
    authUsername: stalwart
    authSecret:
      "@type": "EnvironmentVariable"
      variableName: POSTGRESQL_PASSWORD
  appliedConfig:
    # `singleton` (bool, default false): use an "update" action with the given value.
    # `matchOn` (string): attribute name used for "upsert" matching.
    # `value`: the payload sent to the API.
    - DataStore:
        singleton: true
        value:
          "@type": PostgreSql
          host: postgresql-primary
          database: stalwart
          authUsername: stalwart
          authSecret:
            "@type": "EnvironmentVariable"
            variableName: POSTGRESQL_PASSWORD
    - NetworkListener:
        matchOn: name
        value:
          smtp:
            bind:
              - "[::]:25"
            protocol: smtp
            useTls: false
          smtps:
            bind:
              - "[::]:465"
            protocol: smtp
            tlsImplicit: true
          submission:
            bind:
              - "[::]:587"
            protocol: smtp
          imaps:
            bind:
              - "[::]:993"
            protocol: imap
            tlsImplicit: true

metrics:
  main:
    enabled: false
    type: servicemonitor
    targetSelector: main
    endpoints:
      - port: main
        path: /metrics/prometheus

ingressRouteTCP:
  smtp:
    enabled: true
    match: HostSNI(`*`)
    entryPoint: smtp
    proxyProtocol:
      version: 2
  smtps:
    enabled: true
    match: HostSNI(`*`)
    entryPoint: smtps
    proxyProtocol:
      version: 2
    tls:
      passthrough: true
  submission:
    enabled: true
    match: HostSNI(`*`)
    entryPoint: submission
    proxyProtocol:
      version: 2
    tls:
      passthrough: true
  imaps:
    enabled: true
    match: HostSNI(`*`)
    entryPoint: imaps
    proxyProtocol:
      version: 2
    tls:
      passthrough: true
  pop3s:
    enabled: true
    match: HostSNI(`*`)
    entryPoint: pop3s
    proxyProtocol:
      version: 2
    tls:
      passthrough: true
  sieve:
    enabled: true
    match: HostSNI(`*`)
    entryPoint: sieve
    proxyProtocol:
      version: 2
    tls:
      passthrough: true
